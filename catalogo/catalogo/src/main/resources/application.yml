server:
  port: 8083 # Puerto para el catálogo

spring:
  application:
    name: catalogo-service
    
  datasource:
    url: jdbc:postgresql://localhost:5432/biblioteca_catalogo_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/